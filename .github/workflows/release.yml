name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      - name: Build binaries and create archives
        run: |
          targets=(
            "bun-linux-x64:linux-x64"
            "bun-linux-arm64:linux-arm64"
            "bun-darwin-x64:darwin-x64"
            "bun-darwin-arm64:darwin-arm64"
            "bun-windows-x64:windows-x64"
          )

          mkdir -p dist

          for entry in "${targets[@]}"; do
            target="${entry%%:*}"
            name="${entry##*:}"

            mkdir -p "dist/${name}"

            if [[ "$name" == *windows* ]]; then
              bun build --compile --target="${target}" build/index.js --outfile "dist/${name}/web-proofreading-editor.exe"
            else
              bun build --compile --target="${target}" build/index.js --outfile "dist/${name}/web-proofreading-editor"
            fi

            cp -r build/client "dist/${name}/client"

            if [[ "$name" == *windows* ]]; then
              (cd dist && zip -r "../web-proofreading-editor-${name}.zip" "${name}/")
            else
              tar -czf "web-proofreading-editor-${name}.tar.gz" -C dist "${name}/"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
